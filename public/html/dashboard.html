<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growtopia - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="flex items-center justify-center h-screen bg-[#1e3a5f]">

<div class="bg-[#2b4d6d] border-4 border-[#87b8cc] shadow-lg p-6 w-full max-w-md rounded-lg
            opacity-0 translate-y-[-20px] transition-all duration-500 ease-out"
     id="loginModal">

    <h2 class="text-white text-center font-bold text-xl mb-3">
        Log in with your Grow ID
    </h2>

    <!-- Error Box -->
    <div id="errorDiv"
         class="hidden text-xs text-red-400 font-bold mb-2 text-center">
        <span id="errorMessage"></span>
    </div>

    <form method="POST"
          action="/player/growid/login/validate"
          id="loginForm">

        <!-- Hidden Token -->
        <input type="hidden" name="_token" value="<%= token || '' %>">

        <!-- GrowID -->
        <div class="mb-3">
            <label class="block text-white text-xs mb-1">GrowID</label>
            <div class="flex items-center border-2 border-[#81d4fa] rounded bg-[#2b4d6d] px-2 py-1">
                <i class="fas fa-user text-white mr-2 text-xs"></i>
                <input type="text"
                       name="growId"
                       id="loginGrowId"
                       class="w-full bg-transparent text-white text-xs placeholder-white focus:outline-none"
                       placeholder="Enter your GrowID"
                       autocomplete="off">
            </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="block text-white text-xs mb-1">Password</label>
            <div class="flex items-center border-2 border-[#81d4fa] rounded bg-[#2b4d6d] px-2 py-1">
                <i class="fas fa-lock text-white mr-2 text-xs"></i>
                <input type="password"
                       name="password"
                       id="loginPassword"
                       class="w-full bg-transparent text-white text-xs placeholder-white focus:outline-none"
                       placeholder="Enter your Password">

                <button type="button"
                        id="toggleLogPassword"
                        class="text-white ml-2 text-xs">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <!-- Button -->
        <button type="submit"
                id="loginButton"
                class="w-full py-1 rounded bg-[#00b8ff] text-white text-xs
                       hover:bg-[#06a4dd] transition duration-200">
            Login
        </button>

    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const modal = document.getElementById('loginModal');
    setTimeout(() => {
        modal.classList.remove('opacity-0', 'translate-y-[-20px]');
    }, 100);

    const loginForm = document.getElementById('loginForm');
    const growInput = document.getElementById('loginGrowId');
    const passInput = document.getElementById('loginPassword');
    const errorDiv = document.getElementById('errorDiv');
    const errorMessage = document.getElementById('errorMessage');

    // Restore saved GrowID
    if (localStorage.getItem('growId')) {
        growInput.value = localStorage.getItem('growId');
    }

    loginForm.addEventListener('submit', function (e) {

        const uName = growInput.value.trim();
        const uPass = passInput.value.trim();

        if (!uName || !uPass) {
            e.preventDefault();
            errorDiv.classList.remove('hidden');
            errorMessage.innerText = 'Username or Password is empty';
            return;
        }

        if (uName.length < 4 || uPass.length < 4) {
            e.preventDefault();
            errorDiv.classList.remove('hidden');
            errorMessage.innerText =
                'Username or Password must be at least 4 characters long';
            return;
        }

        localStorage.setItem('growId', uName);
    });

    // Toggle Password
    document.getElementById('toggleLogPassword')
        .addEventListener('click', function () {

        const type = passInput.getAttribute('type');

        if (type === 'password') {
            passInput.setAttribute('type', 'text');
            this.innerHTML = '<i class="fas fa-eye-slash"></i>';
        } else {
            passInput.setAttribute('type', 'password');
            this.innerHTML = '<i class="fas fa-eye"></i>';
        }
    });
});
</script>

</body>
</html>
